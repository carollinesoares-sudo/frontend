<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas MVC</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Lista de Tarefas</h1>

        <div class="form-area">
            <input type="text" name="tarefaInput" id="tarefaInput" placeholder="Digite uma Tarefa...">
            <button id="addTarefaBtn">Adicionar</button>
        </div>

        <p id="mensagem"></p>

        <ul id="listaTarefas"></ul>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
